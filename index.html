<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            color: white;
            background: #4a90e2;
            transition: 0.3s;
        }

        .btn:hover {
            background: #357abd;
            transform: translateY(-2px);
        }

        .btn.secondary {
            background: #50c9a7;
        }

        .btn.secondary:hover {
            background: #3ba88a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ESP32 Dashboard</h1>

    <a href="LED1.html" class="btn">💡 LED Control</a>
    <a href="LED2.html" class="btn secondary">🚦 Traffic Light</a>
</div>

</body>
</html>
